name: Upload to Nexus Mods

on:
  release:
    types: [published]
  # Manual re-upload for a given tag (e.g. when a release-triggered run failed).
  # Runs from the default branch, so it always uses the current (fixed) workflow.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)upload to Nexus (e.g. v1.14.7)"
        required: true

jobs:
  upload-to-nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=$DISPATCH_TAG" >> "$GITHUB_ENV"
          else
            echo "TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          fi

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TAG" --pattern "*.zip" --repo ${{ github.repository }} --clobber
          ls *.zip || { echo "No zip asset found in release"; exit 1; }

      - name: Get zip filename, version and description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "ZIP_FILE=$(ls *.zip)" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          {
            echo "DESCRIPTION<<NEXUS_DESC_EOF"
            gh release view "$TAG" --repo ${{ github.repository }} --json body --jq .body
            echo "NEXUS_DESC_EOF"
          } >> "$GITHUB_ENV"

      # Pinned to the last release before the 2026-06-17 breaking migration
      # (PR #29 "Migrate to createModFileVersion"), which renamed the inputs and
      # made `file_id` required. beta.7 keeps the file_group_id flow used here.
      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.7
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ vars.NEXUSMODS_FILE_GROUP_ID }}
          filename: ${{ env.ZIP_FILE }}
          version: ${{ env.VERSION }}
          description: ${{ env.DESCRIPTION }}
          file_category: main
