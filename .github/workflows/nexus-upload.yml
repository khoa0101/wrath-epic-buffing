name: Upload to Nexus Mods

on:
  release:
    types: [published]
  # Manual re-upload for a given tag (e.g. when a release-triggered run failed).
  # Runs from the default branch, so it always uses the current workflow.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)upload to Nexus (e.g. v1.14.8)"
        required: true

jobs:
  upload-to-nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=$DISPATCH_TAG" >> "$GITHUB_ENV"
          else
            echo "TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          fi

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TAG" --pattern "*.zip" --repo ${{ github.repository }} --clobber
          ls *.zip || { echo "No zip asset found in release"; exit 1; }

      - name: Get zip filename, version and description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "ZIP_FILE=$(ls *.zip)" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          {
            echo "DESCRIPTION<<NEXUS_DESC_EOF"
            gh release view "$TAG" --repo ${{ github.repository }} --json body --jq .body
            echo "NEXUS_DESC_EOF"
          } >> "$GITHUB_ENV"

      # Nexus v3 createModFileVersion flow: POST /mod-files/{file_id}/versions.
      # file_id is the mod-file id from GET /v3/mods/{numeric_mod_id}/files
      # (-> data.mod_files[].id). This mod has a single file, so its id (7180141)
      # equals the old file_group_id value — same number, different resource.
      # Pinned to an immutable tag — NEVER @main: a moving branch shipped the
      # 2026-06-17 breaking input migration that took down v1.14.7's auto-upload.
      # Bump this tag deliberately, never track a branch.
      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ vars.NEXUSMODS_FILE_ID }}
          filename: ${{ env.ZIP_FILE }}
          version: ${{ env.VERSION }}
          description: ${{ env.DESCRIPTION }}
          category: main
          allow_mod_manager_download: true
