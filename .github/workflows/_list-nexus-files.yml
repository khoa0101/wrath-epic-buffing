name: List Nexus Files (temp)

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Nexus v3 endpoints for file ids
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
        run: |
          MOD_JSON=$(curl -s -H "apikey: $NEXUS_API_KEY" \
            "https://api.nexusmods.com/v3/games/pathfinderwrathoftherighteous/mods/948")
          MOD_ID=$(echo "$MOD_JSON" | jq -r '.data.id')
          echo "### numeric mod id: $MOD_ID"

          probe() {
            echo ""
            echo "### GET $1"
            curl -s -H "apikey: $NEXUS_API_KEY" -w "\n--- HTTP %{http_code} ---\n" \
              "https://api.nexusmods.com$1" | head -c 4000
            echo ""
          }

          probe "/v3/mods/$MOD_ID/files"
          probe "/v3/mods/$MOD_ID/file-update-groups"
          probe "/v3/mod-file-update-groups/7180141/versions"
